worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    "" "$msec-$pid-$connection";
  }

  upstream login_service {
    server login-service:7070;
  }

  upstream payment_service {
    server payment-service:8000;
  }

  upstream analytic_service {
    server analytic-service:8001;
  }

  server {
    listen 80;
    server_name localhost;
    client_max_body_size 2m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    send_timeout 30s;
    add_header X-Correlation-Id $correlation_id always;

    location = /gateway/health {
      add_header Content-Type application/json;
      return 200 '{"ok":true,"service":"api-gateway"}';
    }

    location /api/auth/ {
      proxy_pass http://login_service/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-Id $correlation_id;
      proxy_set_header Connection "";
    }

    location /api/payments/ {
      proxy_pass http://payment_service/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-Id $correlation_id;
      proxy_set_header Connection "";
    }

    location /api/analytics/ {
      proxy_pass http://analytic_service/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-Id $correlation_id;
      proxy_set_header Connection "";
    }

    location / {
      add_header Content-Type application/json;
      return 404 '{"error":"Route not found in API gateway"}';
    }
  }
}