name: Deploy ShopMate To AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-0f81ae500a87ed0d1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::055679187407:role/AWS_GITHUB_ACTIONS_ROLE
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          set -e

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${INSTANCE_ID}" \
            --comment "ShopMate Deploy" \
            --parameters 'commands=["sudo -u ec2-user env HOME=/home/ec2-user APP_DIR=/opt/shopmate APP_NAME=shopmate APP_ENV=prod GITHUB_BRANCH=main bash /opt/shopmate/deploy/aws/deploy.sh"]' \
            --timeout-seconds 900 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "Waiting for deployment..."

          for i in {1..90}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --query "CommandInvocations[0].Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/90] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${INSTANCE_ID}" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${INSTANCE_ID}" \
                --query "StandardOutputContent" \
                --output text
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${INSTANCE_ID}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deployment timed out after 15 minutes"
          exit 1
