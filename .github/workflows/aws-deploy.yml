name: Deploy ShopMate To AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  APP_NAME: shopmate
  APP_ENV: prod
  GITHUB_BRANCH: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::055679187407:role/AWS_GITHUB_ACTIONS_ROLE
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 instances via SSM
        run: |
          PARAMS=$(cat <<'JSON'
          {
            "commands": [
              "set -e",

              "echo '=== Preparing server ==='",

              "# Ensure folder exists",
              "mkdir -p /opt/shopmate",

              "# Clone repo if not exists",
              "if [ ! -d /opt/shopmate/.git ]; then",
              "  echo 'Cloning repository...'",
              "  git clone https://github.com/Govindu-Thejana/ShopPal.git /opt/shopmate",
              "else",
              "  echo 'Repository exists, pulling latest changes...'",
              "  cd /opt/shopmate && git pull origin main",
              "fi",

              "# Move to project",
              "cd /opt/shopmate",

              "# Fix permissions",
              "chmod +x deploy/aws/deploy.sh deploy/aws/write-env.sh",

              "# Install dependencies (safe check)",
              "if ! command -v docker &> /dev/null; then",
              "  echo 'Installing Docker...'",
              "  apt update -y && apt install -y docker.io",
              "  systemctl start docker",
              "  systemctl enable docker",
              "fi",

              "# Build & deploy",
              "echo 'Starting deployment...'",
              "APP_NAME=shopmate APP_ENV=prod GITHUB_BRANCH=main APP_DIR=/opt/shopmate ./deploy/aws/deploy.sh"
            ]
          }
          JSON
          )

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:App,Values=shopmate" "Key=tag:Environment,Values=prod" \
            --comment "Deploy ShopMate from GitHub Actions" \
            --parameters "${PARAMS}" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: ${COMMAND_ID}"

          sleep 20

          aws ssm list-command-invocations \
            --command-id "${COMMAND_ID}" \
            --details
