name: Deploy ShopMate Microservices To AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  APP_NAME: shopmate
  APP_ENV: prod
  GITHUB_BRANCH: main
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::055679187407:role/AWS_GITHUB_ACTIONS_ROLE
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          set -e

          PARAMS='{
            "commands": [

              "set -e",

              "echo === Starting Deployment ===",

              "echo Installing dependencies...",
              "sudo yum install -y git docker docker-compose",
              "sudo service docker start",

              "echo Adding ec2-user to docker group...",
              "sudo usermod -aG docker ec2-user || true",

              "echo Cleaning old deployment...",
              "sudo rm -rf /opt/shopmate",
              "sudo mkdir -p /opt/shopmate",

              "echo Cloning repository...",
              "git clone https://x-access-token:${GH_PAT}@github.com/Govindu-Thejana/ShopPal.git /opt/shopmate",

              "cd /opt/shopmate",

              "echo Repo structure:",
              "ls -la",

              "echo Using production docker compose...",
              "docker-compose -f docker-compose.prod.yml down || true",

              "docker-compose -f docker-compose.prod.yml up -d --build",

              "echo Deployment completed successfully"
            ]
          }'

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:App,Values=shopmate" "Key=tag:Environment,Values=prod" \
            --comment "Deploy ShopMate Microservices" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          sleep 25

          aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --details
