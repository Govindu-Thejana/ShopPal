name: Deploy ShopMate To AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  APP_NAME: shopmate
  APP_ENV: prod
  GITHUB_BRANCH: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::055679187407:role/AWS_GITHUB_ACTIONS_ROLE
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 instances via SSM
        run: |
          PARAMS=$(cat <<'JSON'
          {
            "commands": [
              "set -e",

              "echo '=== Installing dependencies safely ==='",

              "if command -v apt >/dev/null 2>&1; then",
              "  sudo apt update -y",
              "  sudo apt install -y git curl unzip",
              "elif command -v yum >/dev/null 2>&1; then",
              "  sudo yum install -y git unzip",
              "fi",

              "echo 'Checking git...'",
              "git --version",

              "echo 'Preparing directory...'",
              "sudo mkdir -p /opt/shopmate",

              "echo 'Cloning or updating repo...'",

              "if [ ! -d /opt/shopmate/.git ]; then",
              "  sudo git clone https://github.com/Govindu-Thejana/ShopPal.git /opt/shopmate",
              "else",
              "  cd /opt/shopmate && sudo git pull origin main",
              "fi",

              "cd /opt/shopmate",

              "echo 'Fixing permissions...'",
              "sudo chmod +x deploy/aws/deploy.sh deploy/aws/write-env.sh",

              "echo 'Running deployment...'",
              "sudo ./deploy/aws/deploy.sh"
            ]
          }
          JSON
          )

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:App,Values=shopmate" "Key=tag:Environment,Values=prod" \
            --comment "Deploy ShopMate from GitHub Actions" \
            --parameters "${PARAMS}" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: ${COMMAND_ID}"

          sleep 20

          aws ssm list-command-invocations \
            --command-id "${COMMAND_ID}" \
            --details
