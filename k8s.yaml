apiVersion: v1
kind: Namespace
metadata:
  name: micro
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: micro-config
  namespace: micro
data:
  KAFKA_BROKERS: "kafka:9092"
  JWT_SECRET: "supersecretkey"
---
apiVersion: v1
kind: Secret
metadata:
  name: micro-secrets
  namespace: micro
type: Opaque
stringData:
  EMAIL_USER: "amarasingheau@gmail.com"
  EMAIL_PASS: "pgww rupq omoj lxir"
  MONGO_URI: "mongodb+srv://nisalmicro:micro1234@microcluster.w872zhn.mongodb.net/?retryWrites=true&w=majority&appName=microcluster"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-service
  namespace: micro
spec:
  replicas: 1
  selector:
    matchLabels: { app: login-service }
  template:
    metadata:
      labels: { app: login-service }
    spec:
      containers:
        - name: login-service
          image: micro/login-service:dev
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKERS
              valueFrom: { configMapKeyRef: { name: micro-config, key: KAFKA_BROKERS } }
            - name: JWT_SECRET
              valueFrom: { configMapKeyRef: { name: micro-config, key: JWT_SECRET } }
          ports:
            - containerPort: 7070
          readinessProbe:
            httpGet: { path: "/", port: 7070 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: login-service
  namespace: micro
spec:
  selector: { app: login-service }
  ports:
    - port: 7070
      targetPort: 7070
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: micro
spec:
  replicas: 1
  selector:
    matchLabels: { app: payment-service }
  template:
    metadata:
      labels: { app: payment-service }
    spec:
      containers:
        - name: payment-service
          image: micro/payment-service:dev
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKERS
              valueFrom: { configMapKeyRef: { name: micro-config, key: KAFKA_BROKERS } }
          ports:
            - containerPort: 8000
          readinessProbe:
            tcpSocket: { port: 8000 }   # POST-only API; use tcp check
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: micro
spec:
  selector: { app: payment-service }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytic-service
  namespace: micro
spec:
  replicas: 1
  selector:
    matchLabels: { app: analytic-service }
  template:
    metadata:
      labels: { app: analytic-service }
    spec:
      containers:
        - name: analytic-service
          image: micro/analytic-service:dev
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKERS
              valueFrom: { configMapKeyRef: { name: micro-config, key: KAFKA_BROKERS } }
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet: { path: "/dashboard/summary", port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytic-service
  namespace: micro
spec:
  selector: { app: analytic-service }
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: micro
spec:
  replicas: 1
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
    spec:
      containers:
        - name: order-service
          image: micro/order-service:dev
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKERS
              valueFrom: { configMapKeyRef: { name: micro-config, key: KAFKA_BROKERS } }
            - name: MONGO_URI
              valueFrom: { secretKeyRef: { name: micro-secrets, key: MONGO_URI } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: micro
spec:
  replicas: 1
  selector:
    matchLabels: { app: email-service }
  template:
    metadata:
      labels: { app: email-service }
    spec:
      containers:
        - name: email-service
          image: micro/email-service:dev
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKERS
              valueFrom: { configMapKeyRef: { name: micro-config, key: KAFKA_BROKERS } }
            - name: EMAIL_USER
              valueFrom: { secretKeyRef: { name: micro-secrets, key: EMAIL_USER } }
            - name: EMAIL_PASS
              valueFrom: { secretKeyRef: { name: micro-secrets, key: EMAIL_PASS } }